name: x86-64-ImmortalWrt

on:
  workflow_dispatch:
  workflow_call:
  # schedule:
  #   - cron: "0 18 * * *"

permissions:
  contents: read
  actions: read

jobs:
  Build:
    uses: ./.github/workflows/Build-OpenWrt.yml
    permissions:
      contents: write
      actions: write
    with:
      repo_url: https://github.com/immortalwrt/immortalwrt.git
      repo_branch: master
      config_file: configs/x86-64.config
      firmware_tag: x86-64
      kernel_file: kernel-6.18
      artifact_prefix: x86.64
      manifest_file: immortalwrt-x86-64-generic.manifest
      remove_sqm_scripts_nss: true
      release_summary: >-
        这是基于ImmortalWrt主线制作的固件，默认主题为Aurora；该固件在ImmortalWrt的基础上，添加了额外的软件包ddns、upnp、wol、samba4、vlmcsd、aria2、autoreboot、uhttpd、frps、frpc、diskman、hd-idle、acme、openlist2、dockerman、gecoosac、wireguard、watchcat、3cat、passwall，并添加了若干工具，具体详见x86-64.config和General.config。
